<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tentativa de senha</title>
</head>
<body>
    <script>
        
    let senha_secreta = "vaitomando"
        
    let tentativa = prompt("Digite a senha do cofre:")
    while (tentativa != senha_secreta) {
        alert("Senha incorreta, tente novamente!")
        tentativa = prompt("Digite a senha do cofre:")
    }
    alert("Senha correta, usufrua do money!")
    </script>
</body>
</html>
