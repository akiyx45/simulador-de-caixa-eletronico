<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
</head>
<body>
    <script>
        let valortabuada = prompt("Qual número você quer a tabuada?")
    
        for (let i = 0; i <= 10; i++){
            mensagem += (i * valortabuada)
            
            if ( i == 9) {
                mensagem += " e "
            } else if ( i < 10) {
                mensagem += ", "
            } else {
                mensagem += "."
            }
        }
    </script>
</body>
</html>
