    <script>
        function verificarAprovacao(n1, n2, n3) {
            let media = (n1 + n2 + n3) / 3;
            if (media >= 7) {
                return "Aprovado com média: " + media.toFixed(2);
         } else {
               return "Reprovado com média: " + media.toFixed(2);
            }
        }
    </script>
